    .chat-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    .voice-wave { display: flex; align-items: center; gap: 3px; height: 32px; }
    .voice-wave .bar {
      width: 4px; border-radius: 2px; background: #3b82f6;
      animation: wave 1s ease-in-out infinite;
    }
    .voice-wave .bar:nth-child(1) { animation-delay: 0s; height: 8px; }
    .voice-wave .bar:nth-child(2) { animation-delay: 0.1s; height: 16px; }
    .voice-wave .bar:nth-child(3) { animation-delay: 0.2s; height: 24px; }
    .voice-wave .bar:nth-child(4) { animation-delay: 0.3s; height: 16px; }
    .voice-wave .bar:nth-child(5) { animation-delay: 0.4s; height: 8px; }
    .voice-wave .bar:nth-child(6) { animation-delay: 0.15s; height: 20px; }
    .voice-wave .bar:nth-child(7) { animation-delay: 0.35s; height: 12px; }

    }
    .voice-wave-red .bar { background: #ef4444; }
    .pulse-ring { animation: pulseRing 1.5s ease-out infinite; }

// ============================================================
// OpenAI Responses API 直接呼び出し (サーバーレス)
// ============================================================
async function callResponsesAPI(input, options = {}) {
  const baseURL = (state.baseURL || 'https://api.openai.com/v1').replace(/\/+$/, '');
  const url = `${baseURL}/responses`;

  const body = {
    model: state.model || 'gpt-5.2',
    input,
    store: false,
    stream: options.stream ?? false,
  };
  if (options.instructions) body.instructions = options.instructions;
  body.reasoning = { effort: options.reasoningEffort ?? 'none' };
  if ((options.reasoningEffort ?? 'none') === 'none' && options.temperature !== undefined) {
    body.temperature = options.temperature;
  }
  if (options.max_output_tokens) body.max_output_tokens = options.max_output_tokens;

  const response = await fetch(url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${state.apiKey}`,
    },
    body: JSON.stringify(body),
  });
  return response;
}

function extractTextFromResponse(responseData) {
  if (!responseData?.output) return '';
  for (const item of responseData.output) {
    if (item.type === 'message' && item.content) {
      for (const c of item.content) {
        if (c.type === 'output_text' && c.text) return c.text;
      }
    }
  }
  return responseData.output_text || '';
}

function buildSystemPrompt(scenario, persona, productURL, goal) {
  const speedMap = {
    slow: 'ゆっくり慎重に考えながら話すスタイル。間を置きながら、一つ一つ確認するように応答してください。応答はやや長めでもOK。',
    normal: '自然なテンポで応答してください。1回の応答は2〜4文程度。',
    fast: 'テンポよく短く応答してください。1回の応答は1〜2文程度で、結論を先に言うスタイル。',
  };
  const toneMap = {
    gentle: '柔らかく丁寧な口調で、「〜ですね」「〜でしょうか」といった表現を使ってください。',
    firm: '堅実で厳格な口調で、「〜です」「〜である」といった表現を使い、核心を突く質問をしてください。',
    friendly: '親しみやすくフレンドリーな口調で、笑いや相槌を交えて話してください。',
    business: '簡潔で効率的なビジネスライクな口調で、要点を絞った応答をしてください。',
  };
  const speedInstruction = speedMap[state.personaSpeed] || speedMap.normal;
  const toneInstruction = toneMap[state.personaTone] || toneMap.business;

  let prompt = `あなたは営業ロールプレイングの練習相手として「顧客役」を演じてください。
この会話では、あなた(assistant)＝顧客、相手(user)＝営業担当者です。
あなたは絶対に営業担当者の立場で話してはいけません。常に顧客としてのみ発言してください。

## シナリオ
${scenario}

## あなたが演じる顧客のペルソナ
${persona}

## 応答スタイル
- 話すスピード: ${speedInstruction}
- トーン: ${toneInstruction}`;
  if (productURL) {
    prompt += `\n\n## 営業担当が提案する商品/サービス\n参考URL: ${productURL}\n※営業担当がこのサービスについて説明してくるかもしれません。顧客として内容について質問したり、疑問を投げかけてください。`;
  }
  if (goal) {
    prompt += `\n\n## このロープレのゴール設定（営業担当の目標）\n${goal}\n※これは営業担当の目標です。あなたは顧客なので、簡単にはこの目標を達成させないでください。ただし良い提案をされたら段階的に前向きになってください。`;
  }
  if (state.closingPoints && state.closingPoints.trim()) {
    prompt += `\n\n## クロージングポイント（重要）
以下のポイントが営業担当から適切に提示・質問された場合、顧客として前向きに反応し、クロージングに協力的になってください。
ただし、営業担当がこれらのポイントに触れていない間は、無理に話を進めたり長々と反応したりせず、ためらいや疑問を保ち続けてください。
${state.closingPoints}`;
  }
  prompt += `\n\n## 重要なルール
- 必ず日本語で応答してください
- あなたは「顧客」です。営業担当者ではありません。この点を絶対に忘れないでください
- 顧客の立場から、自然で現実的な反応をしてください
- 簡単には承諾せず、適度に質問や懸念を投げかけてください
- 無駄に長い応答は避け、簡潔に応答してください（応答スタイルの指示を優先）
- 相手（営業担当者）の提案が良ければ段階的に前向きになってください
- 感情的な反応も適度に入れてください（興味、疑問、不安など）
- 「AI」「ロールプレイ」「シミュレーション」などメタ的な発言は一切しないでください
- あくまで本物の顧客として振る舞い続けてください
- 自己紹介する時はペルソナに記載されている名前・肩書きを使ってください`;
  return prompt;
}

// ============================================================
// テンプレート管理
// ============================================================
window.saveTemplate = () => {
  const scenario = document.getElementById('scenario')?.value || '';
  const persona = document.getElementById('persona')?.value || '';
  const criteria = document.getElementById('criteria')?.value || '';
  const productURL = document.getElementById('productURL')?.value || '';
  const goal = document.getElementById('goal')?.value || '';
  if (!scenario.trim()) { showToast('シナリオを入力してからテンプレートを保存してください', 'error'); return; }
  const name = prompt('テンプレート名を入力してください:', scenario.substring(0, 30) + '...');
  if (!name) return;
  state.templates.push({ name, scenario, persona, criteria, productURL, goal, personaSpeed: state.personaSpeed, personaTone: state.personaTone, closingPoints: document.getElementById('closingPoints')?.value || '', createdAt: Date.now() });
  localStorage.setItem('roleplay_templates', JSON.stringify(state.templates));
  render(); showToast(`テンプレート「${name}」を保存しました`, 'success');
};
window.loadTemplate = (index) => { const t = state.templates[index]; if (!t) return; state.scenario=t.scenario||''; state.persona=t.persona||''; state.criteria=t.criteria||''; state.productURL=t.productURL||''; state.goal=t.goal||''; state.personaSpeed=t.personaSpeed||'normal'; state.personaTone=t.personaTone||'business'; state.closingPoints=t.closingPoints||''; render(); showToast(`テンプレート「${t.name}」を読み込みました`, 'success'); };
window.deleteTemplate = (index) => { const t = state.templates[index]; if (!t) return; if (!confirm(`テンプレート「${t.name}」を削除しますか？`)) return; state.templates.splice(index, 1); localStorage.setItem('roleplay_templates', JSON.stringify(state.templates)); render(); showToast('テンプレートを削除しました'); };
window.toggleTemplateList = () => { const list = document.getElementById('templateList'); if (list) list.classList.toggle('hidden'); };

// ============================================================
// API設定
// ============================================================
window.saveApiSettings = () => {
  state.apiKey = document.getElementById('apiKey').value.trim();
  state.baseURL = document.getElementById('baseURL').value.trim() || 'https://api.openai.com/v1';
  state.model = getSelectedModel();
  state.apiConnected = false;
  localStorage.setItem('roleplay_apiKey', state.apiKey);
  localStorage.setItem('roleplay_baseURL', state.baseURL);
  localStorage.setItem('roleplay_model', state.model);
  render(); showToast('設定を保存しました');
};

function getSelectedModel() {
  const sel = document.getElementById('model');
  if (!sel) return state.model;
  const val = sel.value;
  if (val === 'custom') { const c = document.getElementById('modelCustom'); return (c && c.value.trim()) || 'gpt-4o-mini'; }
  return val;
}

window.onModelSelectChange = () => { const sel = document.getElementById('model'); const ci = document.getElementById('modelCustom'); if (sel && ci) { ci.classList.toggle('hidden', sel.value !== 'custom'); if (sel.value === 'custom') ci.focus(); } };
window.onTtsModeChange = (mode) => {
  state.ttsMode = mode; localStorage.setItem('roleplay_ttsMode', mode);
  const section = document.getElementById('ttsVoiceSection');
  if (section) section.classList.toggle('hidden', mode !== 'api');
  document.querySelectorAll('label:has(input[name="ttsMode"])').forEach(l => {
    const r = l.querySelector('input');
    if (r.checked) { l.className = l.className.replace(/border-gray-200 bg-white hover:border-blue-300/g, 'border-blue-500 bg-blue-50'); if (!l.className.includes('border-blue-500')) l.className = l.className.replace(/border-gray-200/g, 'border-blue-500').replace(/bg-white/g, 'bg-blue-50'); }
    else { l.className = l.className.replace(/border-blue-500 bg-blue-50/g, 'border-gray-200 bg-white hover:border-blue-300'); }
  });
};
window.onTtsVoiceChange = () => { const s = document.getElementById('ttsVoice'); if (s) { state.ttsVoice = s.value; localStorage.setItem('roleplay_ttsVoice', s.value); } };

// ===== ペルソナパラメータ =====
window.setPersonaSpeed = (speed) => {
  state.personaSpeed = speed; localStorage.setItem('roleplay_personaSpeed', speed);
  PERSONA_SPEEDS.forEach(s => { const btn = document.getElementById('speed-' + s.id); if (btn) { btn.className = btn.className.replace(s.id === speed ? /border-gray-200 bg-white text-gray-600 hover:border-blue-300/g : /border-blue-500 bg-blue-50 text-blue-700/g, s.id === speed ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 bg-white text-gray-600 hover:border-blue-300'); } });
};
window.setPersonaTone = (tone) => {
  state.personaTone = tone; localStorage.setItem('roleplay_personaTone', tone);
  PERSONA_TONES.forEach(t => { const btn = document.getElementById('tone-' + t.id); if (btn) { btn.className = btn.className.replace(t.id === tone ? /border-gray-200 bg-white text-gray-600 hover:border-blue-300/g : /border-blue-500 bg-blue-50 text-blue-700/g, t.id === tone ? 'border-blue-500 bg-blue-50 text-blue-700' : 'border-gray-200 bg-white text-gray-600 hover:border-blue-300'); } });
};

// 接続テスト（直接API呼び出し）
window.testConnection = async () => {
  const apiKey = document.getElementById('apiKey').value.trim();
  const baseURL = document.getElementById('baseURL').value.trim() || 'https://api.openai.com/v1';
  const model = getSelectedModel();
  if (!apiKey) { showToast('APIキーを入力してください', 'error'); return; }
  const btn = document.getElementById('testBtn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>テスト中...'; btn.disabled = true;
  // 一時的にstateを更新してAPI呼び出し
  const origKey = state.apiKey, origURL = state.baseURL, origModel = state.model;
  state.apiKey = apiKey; state.baseURL = baseURL; state.model = model;
  try {
    const response = await callResponsesAPI(
      [{ role: 'user', content: 'テスト。「接続成功」とだけ返答してください。' }],
      { stream: false, reasoningEffort: 'none', temperature: 0, max_output_tokens: 20 }
    );
    if (!response.ok) { const e = await response.text(); throw new Error(e); }
    const result = await response.json();
    const content = extractTextFromResponse(result);
    state.apiConnected = true;
    localStorage.setItem('roleplay_apiKey', apiKey); localStorage.setItem('roleplay_baseURL', baseURL); localStorage.setItem('roleplay_model', model);
    showToast(`接続成功！ モデル: ${result.model || model}`, 'success');
  } catch (e) {
    state.apiConnected = false;
    state.apiKey = origKey; state.baseURL = origURL; state.model = origModel;
    showToast(`接続失敗: ${e.message}`, 'error');
  }
  render();
};

function showToast(message, type = 'info') {
  const existing = document.getElementById('toast'); if (existing) existing.remove();
  const colors = { info: 'bg-blue-500', success: 'bg-green-500', error: 'bg-red-500' };
  const toast = document.createElement('div');
  toast.id = 'toast';
  toast.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-xl shadow-lg z-50 fade-in text-sm font-medium max-w-sm`;
  toast.textContent = message; document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

window.applyPreset = (key) => {
  const p = PRESETS[key]; state.scenario=p.scenario; state.persona=p.persona; state.criteria=p.criteria; state.productURL=''; state.goal=''; state.closingPoints='';
  const el = (id) => document.getElementById(id);
  if(el('scenario')) el('scenario').value=p.scenario;
  if(el('persona')) el('persona').value=p.persona;
  if(el('criteria')) el('criteria').value=p.criteria;
  if(el('productURL')) el('productURL').value='';
  if(el('goal')) el('goal').value='';
  if(el('closingPoints')) el('closingPoints').value='';
  showToast(`「${p.name}」を適用しました`);
};

window.startRoleplay = () => {
  state.scenario=document.getElementById('scenario').value; state.persona=document.getElementById('persona').value;
  state.criteria=document.getElementById('criteria').value; state.productURL=document.getElementById('productURL')?.value||'';
  state.goal=document.getElementById('goal')?.value||''; state.closingPoints=document.getElementById('closingPoints')?.value||'';
  state.autoSpeak=document.getElementById('autoSpeak').checked;
  if (!state.apiKey) { showToast('APIキーを設定してください', 'error'); return; }
  if (!state.scenario.trim() || !state.persona.trim()) { showToast('シナリオと顧客ペルソナは必須です', 'error'); return; }
  state.messages=[]; state.turnCount=0; state.currentScreen='roleplay'; state.startTime=Date.now(); state.elapsedSeconds=0; state.showTextInput=false;
  render(); startTimer(); generateAIFirstMessage();
};

// ===== DOM部分更新 =====
function appendChatBubble(msg) { const ca = document.getElementById('chatArea'); if (!ca) return; const t = document.getElementById('typingIndicator'); if (t) t.remove(); const div = document.createElement('div'); div.innerHTML = renderChatBubble(msg, state.messages.length - 1); ca.appendChild(div.firstElementChild); scrollChatToBottom(); }
function showTypingIndicator() { const ca = document.getElementById('chatArea'); if (!ca || document.getElementById('typingIndicator')) return; const div = document.createElement('div'); div.innerHTML = renderTypingIndicator(); ca.appendChild(div.firstElementChild); scrollChatToBottom(); }
function hideTypingIndicator() { const t = document.getElementById('typingIndicator'); if (t) t.remove(); }
function updateStatusArea() { const s = document.getElementById('statusArea'); if (s) s.innerHTML = renderStatusText(); }
function updateMicUI() {
  const micBtn = document.getElementById('micBtn');
  if (micBtn) {
    if (state.isListening) { micBtn.className = 'w-12 h-12 rounded-full bg-red-500 hover:bg-red-600 text-white flex items-center justify-center shadow-lg transition-all relative'; micBtn.innerHTML = '<div class="absolute inset-0 rounded-full bg-red-400 pulse-ring"></div><i class="fas fa-microphone-slash text-lg relative z-10"></i>'; micBtn.disabled = false; }
    else { micBtn.className = 'w-16 h-16 rounded-full btn-primary text-white flex items-center justify-center shadow-lg transition-all relative'; micBtn.innerHTML = '<i class="fas fa-microphone text-xl"></i>'; micBtn.disabled = state.isProcessing || state.isSpeaking; }
  }

function updateTurnCount() { const el = document.getElementById('turnCount'); if (el) el.textContent = state.turnCount; }

// ===== AI第一声 (直接API呼び出し + ストリーミング) =====
async function generateAIFirstMessage() {
  state.isProcessing = true; showTypingIndicator(); updateMicUI();
  try {
    const systemPrompt = buildSystemPrompt(state.scenario, state.persona, state.productURL, state.goal);
    const input = [{ role: 'user', content: '（営業担当がお客様のオフィスに到着し、受付を通って会議室に案内されました。お客様が会議室に入ってきます。お客様として最初の一言をお願いします。簡潔に挨拶してください。）' }];
    const response = await callResponsesAPI(input, { stream: true, instructions: systemPrompt, reasoningEffort: 'none', temperature: 0.8, max_output_tokens: 300 });
    if (!response.ok) { const e = await response.text(); throw new Error(`API エラー (${response.status}): ${e}`); }
    const text = await readStreamRealtimeSSE(response, 'assistant');
    state.messages[state.messages.length - 1].content = text;
    state.isProcessing = false; updateMicUI();
    if (state.autoSpeak) speak(text);
  } catch (e) {
    console.error('AI first message error:', e);
    state.isProcessing = false;
    const fallback = 'はい、どちらさまでしょうか？';
    state.messages.push({ role: 'assistant', content: fallback });
    hideTypingIndicator(); appendChatBubble(state.messages[state.messages.length - 1]); updateMicUI();
    if (state.autoSpeak) speak(fallback);
    if (e.message) showToast(`AIエラー: ${e.message}`, 'error');
  }
}

// ===== SSEストリーミング読み取り（Responses API event形式） =====
async function readStreamRealtimeSSE(response, role) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let text = '';
  let buffer = '';

  hideTypingIndicator();
  state.messages.push({ role, content: '' });
  const msgIndex = state.messages.length - 1;
  appendChatBubble(state.messages[msgIndex]);

  const chatArea = document.getElementById('chatArea');
  const bubbles = chatArea?.querySelectorAll('.chat-bubble-text');
  const lastBubbleText = bubbles ? bubbles[bubbles.length - 1] : null;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';

    let currentEventType = null;
    for (const line of lines) {
      if (line.startsWith('event:')) {
        currentEventType = line.slice(6).trim();
      } else if (line.startsWith('data:')) {
        const dataStr = line.slice(5).trim();
        if (!dataStr || dataStr === '[DONE]') continue;
        if (currentEventType === 'response.output_text.delta') {
          try {
            const parsed = JSON.parse(dataStr);
            const delta = parsed.delta || '';
            if (delta) {
              text += delta;
              state.messages[msgIndex].content = text;
              if (lastBubbleText) { lastBubbleText.textContent = text; scrollChatToBottom(); }
            }
          } catch {}
        }
        currentEventType = null;
      }
    }
  }
  return text.trim();
}

async function readStream(response) {
  const reader = response.body.getReader(); const decoder = new TextDecoder(); let text = '';
  while (true) { const { done, value } = await reader.read(); if (done) break; text += decoder.decode(value, { stream: true }); }
  return text.trim();
}

// ============================================================
// 音声認識
// ============================================================
window.toggleListening = () => { state.isListening ? stopListening() : startListening(); };

window.sendVoiceMessage = () => {
  if (!state.isListening) return;
  const text = state._voiceTranscript || '';
  if (!text.trim()) { showToast('まだ音声が認識されていません。話してからボタンを押してください。', 'error'); return; }
  state._voiceTranscript = ''; updateInterimDisplay(''); pauseListeningForResponse();
  state.isListening = false; updateMicUI(); render(); sendMessage(text.trim());
};

function updateSendVoiceBtn() {
  const btn = document.getElementById('sendVoiceBtn'); if (!btn) return;
  const hasText = !!(state._voiceTranscript && state._voiceTranscript.trim());
  btn.disabled = !hasText;
  btn.className = `w-16 h-16 rounded-full ${hasText ? 'bg-green-500 hover:bg-green-600' : 'bg-gray-300 cursor-not-allowed'} text-white flex items-center justify-center shadow-lg transition-all relative`;
}

function createRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('お使いのブラウザは音声認識に対応していません。Chrome をお使いください。', 'error'); return null; }
  const recognition = new SR();
  recognition.lang = 'ja-JP'; recognition.continuous = true; recognition.interimResults = true; recognition.maxAlternatives = 1;
  let finalTranscript = ''; state._voiceTranscript = '';
  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) { if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript; else interim += e.results[i][0].transcript; }
    state._voiceTranscript = finalTranscript;
    updateInterimDisplay(finalTranscript + interim);
    updateSendVoiceBtn();
  };
  recognition.onerror = (e) => { if (e.error === 'not-allowed' || e.error === 'service-not-allowed') { showToast('マイクへのアクセスが許可されていません。', 'error'); state.isListening = false; state.recognition = null; updateMicUI(); } };
  recognition.onend = () => {
    if (state.isListening && !state.isProcessing && !state.isSpeaking) {
      try { recognition.start(); } catch(err) { setTimeout(() => { if (state.isListening) { try { recognition.start(); } catch(e2) { state.isListening = false; state.recognition = null; updateMicUI(); } } }, 500); }
    }
  };
  return recognition;
}

function startListening() {
  if (state.isSpeaking || state.isProcessing) return;
  state.synthesis.cancel(); state.isSpeaking = false;
  if (state.recognition) { try { state.recognition.abort(); } catch(e) {} state.recognition = null; }
  const recognition = createRecognition(); if (!recognition) return;
  try { recognition.start(); state.recognition = recognition; state.isListening = true; state._voiceTranscript = ''; render(); scrollChatToBottom(); } catch (e) { showToast('マイクの起動に失敗しました。', 'error'); }
}

function stopListening() {
  state.isListening = false; state._voiceTranscript = '';
  if (state.recognition) { try { state.recognition.abort(); } catch(e) {} state.recognition = null; }
  state.interimTranscript = ''; updateMicUI(); updateInterimDisplay(''); render(); scrollChatToBottom();
}
function pauseListeningForResponse() { if (state.recognition) { try { state.recognition.abort(); } catch(e) {} state.recognition = null; } }
function resumeListeningAfterResponse() {
  if (state.isListening && !state.recognition && !state.isSpeaking && !state.isProcessing) {
    const recognition = createRecognition(); if (!recognition) return;
    try { recognition.start(); state.recognition = recognition; state._voiceTranscript = ''; render(); scrollChatToBottom(); } catch(e) {}
  }
}

function updateInterimDisplay(text) {
  state.interimTranscript = text;
  const c = document.getElementById('interimContainer');
  if (c) {
    if (text) { c.innerHTML = `<p class="text-sm text-blue-700"><i class="fas fa-microphone text-blue-400 mr-1"></i><span class="font-medium">認識中:</span> ${escapeHtml(text)}</p>`; c.classList.remove('hidden'); }
    else if (state.isListening) { c.innerHTML = '<p class="text-sm text-blue-400 italic"><i class="fas fa-microphone text-blue-300 mr-1"></i>話し始めてください...</p>'; c.classList.remove('hidden'); }
    else { c.innerHTML = ''; c.classList.add('hidden'); }
  }
}

// ===== メッセージ送信 (直接API呼び出し) =====
async function sendMessage(text) {
  if (!text.trim() || state.isProcessing) return;
  state.messages.push({ role: 'user', content: text.trim() });
  state.turnCount++; state.isProcessing = true;
  appendChatBubble(state.messages[state.messages.length - 1]);
  showTypingIndicator(); updateMicUI(); updateTurnCount();
  try {
    const systemPrompt = buildSystemPrompt(state.scenario, state.persona, state.productURL, state.goal);
    const input = state.messages.map(m => ({ role: m.role, content: m.content }));
    const response = await callResponsesAPI(input, { stream: true, instructions: systemPrompt, reasoningEffort: 'none', temperature: 0.8, max_output_tokens: 300 });
    if (!response.ok) { const e = await response.text(); throw new Error(`API エラー (${response.status}): ${e}`); }
    const aiText = await readStreamRealtimeSSE(response, 'assistant');
    state.messages[state.messages.length - 1].content = aiText;
    state.isProcessing = false; updateMicUI();
    if (state.autoSpeak) { speak(aiText, () => resumeListeningAfterResponse()); } else { resumeListeningAfterResponse(); }
  } catch (e) {
    console.error('Chat error:', e); state.isProcessing = false; hideTypingIndicator(); updateMicUI();
    showToast(`エラー: ${e.message}`, 'error'); resumeListeningAfterResponse();
  }
}

window.toggleTextInput = () => { state.showTextInput = !state.showTextInput; const a = document.getElementById('textInputArea'); if (a) { a.classList.toggle('hidden', !state.showTextInput); if (state.showTextInput) document.getElementById('textInput')?.focus(); } };
window.sendText = () => { const i = document.getElementById('textInput'); if (i && i.value.trim()) { sendMessage(i.value); i.value = ''; } };

// ============================================================
// TTS
// ============================================================
let currentAudio = null;
function speak(text, onComplete) { if (state.ttsMode === 'api') speakWithAPI(text, onComplete); else speakWithBrowser(text, onComplete); }

async function speakWithAPI(text, onComplete) {
  state.isSpeaking = true; updateMicUI();
  try {
    const baseURL = (state.baseURL || 'https://api.openai.com/v1').replace(/\/+$/, '');
    const url = `${baseURL}/audio/speech`;
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${state.apiKey}` },
      body: JSON.stringify({ model: 'gpt-4o-mini-tts', input: text, voice: state.ttsVoice || 'coral', response_format: 'mp3',
        instructions: '自然な日本語で話してください。ビジネスの打ち合わせで実際に話しているような口調で、適度な間や感情の起伏を含めて読み上げてください。' }),
    });
    if (!response.ok) { console.warn('TTS API failed, falling back to browser TTS'); speakWithBrowser(text, onComplete); return; }
    const blob = await response.blob(); const audioUrl = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    const audio = new Audio(audioUrl); currentAudio = audio;
    audio.onended = () => { URL.revokeObjectURL(audioUrl); currentAudio = null; state.isSpeaking = false; updateMicUI(); if (onComplete) onComplete(); };
    audio.onerror = () => { URL.revokeObjectURL(audioUrl); currentAudio = null; state.isSpeaking = false; updateMicUI(); speakWithBrowser(text, onComplete); };
    audio.play().catch(() => { state.isSpeaking = false; updateMicUI(); speakWithBrowser(text, onComplete); });
  } catch (e) { console.warn('TTS API error:', e); state.isSpeaking = false; updateMicUI(); speakWithBrowser(text, onComplete); }
}

function speakWithBrowser(text, onComplete) {
  state.synthesis.cancel();
  const u = new SpeechSynthesisUtterance(text); u.lang = 'ja-JP'; u.rate = 1.1; u.pitch = 1.0;
  if (state.selectedVoice) u.voice = state.selectedVoice;
  u.onstart = () => { state.isSpeaking = true; updateMicUI(); };
  u.onend = () => { state.isSpeaking = false; updateMicUI(); if (onComplete) onComplete(); };
  u.onerror = () => { state.isSpeaking = false; updateMicUI(); if (onComplete) onComplete(); };
  state.synthesis.speak(u);
}

function scrollChatToBottom() { setTimeout(() => { const el = document.getElementById('chatArea'); if (el) el.scrollTop = el.scrollHeight; }, 100); }

// ===== ロープレ終了 =====
window.endRoleplay = () => {
  if (state.messages.length < 2) { showToast('もう少し会話を続けてからフィードバックを受けましょう', 'error'); return; }
  if (!confirm('ロープレを終了してフィードバックを受けますか？')) return;
  stopListening(); state.synthesis.cancel(); if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  clearInterval(state.timerInterval); state.isListening = false; state.isSpeaking = false;
  state.currentScreen = 'feedback'; state.isFeedbackLoading = true; render(); generateFeedback();
};

// ============================================================
// 画面3: フィードバック (直接API呼び出し)
// ============================================================
async function generateFeedback() {
  try {
    const conversationLog = state.messages.map(m => `${m.role === 'user' ? '【営業担当（練習者）】' : '【顧客（AI）】'}：${m.content}`).join('\n');
    const feedbackPrompt = `あなたは営業研修の専門コーチです。以下のロールプレイングの会話ログを分析し、「営業担当（練習者）」のパフォーマンスについて詳細なフィードバックを提供してください。
注意：「顧客（AI）」はAIが演じた顧客役です。評価対象は「営業担当（練習者）」の発言・行動のみです。

## ロープレシナリオ
${state.scenario}

## 顧客ペルソナ
${state.persona}
${state.productURL ? `\n## 提案商品/サービスURL\n${state.productURL}` : ''}
${state.goal ? `\n## 営業のゴール設定\n${state.goal}` : ''}
${state.closingPoints ? `\n## クロージングポイント\n${state.closingPoints}\n※営業担当がこれらのポイントに到達できたかどうかも評価に含めてください。` : ''}

## 評価基準
${state.criteria}

## 会話ログ
${conversationLog}

## フィードバック形式
以下のJSON形式で回答してください。必ず有効なJSONのみを返してください（マークダウンのコードブロック記法は使わないでください）。
{"overallScore":<1-100>,"summary":"<全体の総評>","scores":[{"criterion":"<基準名>","score":<1-10>,"maxScore":10,"comment":"<コメント>"}],"strengths":["<良かった点>"],"improvements":["<改善点>"],"modelAnswer":"<模範的な対応例>"}`;

    const response = await callResponsesAPI(
      [{ role: 'user', content: feedbackPrompt }],
      { stream: false, reasoningEffort: 'none', temperature: 0.4, max_output_tokens: 2000 }
    );
    if (!response.ok) { const e = await response.text(); throw new Error(`API エラー (${response.status}): ${e}`); }
    const result = await response.json();
    const content = extractTextFromResponse(result);
    try { state.feedback = JSON.parse(content); } catch {
      const jsonMatch = content.match(/\{[\s\S]*\}/);
      if (jsonMatch) { try { state.feedback = JSON.parse(jsonMatch[0]); } catch { state.feedback = { overallScore: 0, summary: content, scores: [], strengths: [], improvements: [], modelAnswer: '' }; } }
      else { state.feedback = { overallScore: 0, summary: content, scores: [], strengths: [], improvements: [], modelAnswer: '' }; }
    }
  } catch (e) {
    console.error('Feedback error:', e);
    state.feedback = { overallScore: 0, summary: `フィードバック生成に失敗: ${e.message}`, scores: [], strengths: [], improvements: [], modelAnswer: '' };
  }
  state.isFeedbackLoading = false; render();
}

function renderFeedback() {
  if (state.isFeedbackLoading) return `<div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50 flex items-center justify-center"><div class="text-center"><div class="animate-spin w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div><p class="text-lg font-semibold text-gray-700">フィードバックを生成中...</p><p class="text-sm text-gray-500 mt-2">AIが会話を分析しています</p></div></div>`;

  const fb = state.feedback || {};
  const minutes = Math.floor(state.elapsedSeconds / 60); const seconds = state.elapsedSeconds % 60;
  const score = typeof fb.overallScore === 'number' ? fb.overallScore : 0;
  const scoreColor = score >= 70 ? 'text-green-600' : score >= 40 ? 'text-yellow-600' : 'text-red-600';
  const summary = fb.summary || 'フィードバックデータが取得できませんでした。';
  const scores = Array.isArray(fb.scores) ? fb.scores : [];
  const strengths = Array.isArray(fb.strengths) ? fb.strengths : [];
  const improvements = Array.isArray(fb.improvements) ? fb.improvements : [];
  const modelAnswer = fb.modelAnswer || '';

  let scoresHtml = '';
  if (scores.length > 0) {
    const itemsHtml = scores.map(s => {
      const sc = typeof s.score === 'number' ? s.score : 0;
      const ms = typeof s.maxScore === 'number' ? s.maxScore : 10;
      const pct = ms > 0 ? Math.min((sc / ms) * 100, 100) : 0;
      const bc = pct >= 70 ? 'bg-green-500' : pct >= 40 ? 'bg-yellow-500' : 'bg-red-500';
      const tc = pct >= 70 ? 'text-green-600' : pct >= 40 ? 'text-yellow-600' : 'text-red-600';
      return `<div class="mb-3"><div class="flex justify-between items-center mb-1"><span class="text-sm font-medium text-gray-700 break-words">${escapeHtml(s.criterion || '')}</span><span class="text-sm font-bold ${tc} flex-shrink-0 ml-2">${sc}/${ms}</span></div><div class="w-full bg-gray-100 rounded-full h-2.5 mb-1"><div class="${bc} h-2.5 rounded-full score-bar-fill" style="width:${pct}%"></div></div><p class="text-xs text-gray-500 break-words">${escapeHtml(s.comment || '')}</p></div>`;
    }).join('');
    scoresHtml = `<div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 slide-in"><h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fas fa-star text-yellow-500"></i>項目別評価</h2><div>${itemsHtml}</div></div>`;
  }

  let strengthsHtml = '';
  if (strengths.length > 0) {
    strengthsHtml = `<div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6"><h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2"><i class="fas fa-thumbs-up text-green-500"></i>良かった点</h2><ul class="space-y-2">${strengths.map(s=>`<li class="flex items-start gap-2 text-sm text-gray-700"><i class="fas fa-check-circle text-green-400 mt-0.5 flex-shrink-0"></i><span class="break-words min-w-0">${escapeHtml(s)}</span></li>`).join('')}</ul></div>`;
  }
  let improvementsHtml = '';
  if (improvements.length > 0) {
    improvementsHtml = `<div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6"><h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2"><i class="fas fa-lightbulb text-orange-500"></i>改善ポイント</h2><ul class="space-y-2">${improvements.map(s=>`<li class="flex items-start gap-2 text-sm text-gray-700"><i class="fas fa-arrow-circle-up text-orange-400 mt-0.5 flex-shrink-0"></i><span class="break-words min-w-0">${escapeHtml(s)}</span></li>`).join('')}</ul></div>`;
  }
  let modelAnswerHtml = '';
  if (modelAnswer) {
    modelAnswerHtml = `<div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-2xl border border-blue-200 p-6 slide-in"><h2 class="text-lg font-bold text-gray-800 mb-3 flex items-center gap-2"><i class="fas fa-trophy text-blue-500"></i>模範的な対応例</h2><p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap break-words">${escapeHtml(modelAnswer)}</p></div>`;
  }
  const logsHtml = state.messages.map(m => `<div class="flex items-start gap-2 text-sm ${m.role==='user'?'text-blue-700':'text-gray-700'} py-1"><span class="font-bold flex-shrink-0 whitespace-nowrap">${m.role==='user'?'営業:':'顧客:'}</span><span class="break-words min-w-0">${escapeHtml(m.content)}</span></div>`).join('');

  return `
  <div class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-indigo-50">
    <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 sticky top-0 z-10">
      <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3 min-w-0"><div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center flex-shrink-0"><i class="fas fa-chart-line text-white text-lg"></i></div><div class="min-w-0"><h1 class="text-xl font-bold text-gray-800 truncate">フィードバック</h1><p class="text-xs text-gray-500">ロープレ結果レポート</p></div></div>
        <button onclick="backToSetup()" class="text-sm text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1 flex-shrink-0 ml-2"><i class="fas fa-redo"></i>もう一度</button>
      </div>
    </header>
    <main class="max-w-4xl mx-auto px-4 py-8 space-y-6">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 slide-in overflow-hidden">
        <div class="flex flex-col sm:flex-row items-center gap-6">
          <div class="relative w-28 h-28 sm:w-32 sm:h-32 flex-shrink-0">
            <svg class="w-full h-full -rotate-90" viewBox="0 0 36 36"><path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="#e5e7eb" stroke-width="3"/><path d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="url(#sg)" stroke-width="3" stroke-dasharray="${score}, 100" stroke-linecap="round"/><defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#3b82f6"/><stop offset="100%" style="stop-color:#8b5cf6"/></linearGradient></defs></svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-3xl font-bold ${scoreColor}">${score}</span><span class="text-xs text-gray-500">/ 100</span></div>
          </div>
          <div class="flex-1 text-center sm:text-left min-w-0">
            <p class="text-gray-700 leading-relaxed break-words">${escapeHtml(summary)}</p>
            <div class="mt-3 flex flex-wrap gap-2 justify-center sm:justify-start">
              <span class="text-xs bg-blue-50 text-blue-700 px-3 py-1 rounded-full whitespace-nowrap"><i class="fas fa-clock mr-1"></i>${minutes}分${seconds}秒</span>
              <span class="text-xs bg-purple-50 text-purple-700 px-3 py-1 rounded-full whitespace-nowrap"><i class="fas fa-comments mr-1"></i>${state.turnCount}ターン</span>
              ${state.goal ? `<span class="text-xs bg-amber-50 text-amber-700 px-3 py-1 rounded-full"><i class="fas fa-bullseye mr-1"></i>目標: ${escapeHtml(state.goal.substring(0, 20))}${state.goal.length > 20 ? '...' : ''}</span>` : ''}
            </div>
          </div>
        </div>
      </div>
      ${scoresHtml}
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 slide-in">${strengthsHtml}${improvementsHtml}</div>
      ${modelAnswerHtml}
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 slide-in overflow-hidden">
        <details><summary class="cursor-pointer text-lg font-bold text-gray-800 flex items-center gap-2"><i class="fas fa-scroll text-gray-500"></i>会話ログ</summary>
          <div class="mt-4 space-y-1 max-h-96 overflow-y-auto chat-scroll">${logsHtml}</div>
        </details>
      </div>
      <div class="text-center pb-8 slide-in flex flex-wrap justify-center gap-3">
        <button onclick="downloadFeedbackCSV()" class="bg-white border-2 border-green-500 text-green-700 hover:bg-green-50 px-6 py-3 rounded-2xl font-bold shadow-sm inline-flex items-center gap-2 transition-all text-sm"><i class="fas fa-file-csv"></i>CSVダウンロード</button>
        <button onclick="backToSetup()" class="btn-primary text-white px-8 py-3 rounded-2xl font-bold shadow-lg inline-flex items-center gap-2 text-sm"><i class="fas fa-redo"></i>もう一度ロープレする</button>
      </div>
    </main>
  </div>`;
}

// ============================================================
// CSVダウンロード
// ============================================================
window.downloadFeedbackCSV = () => {
  const fb = state.feedback;
  if (!fb) { showToast('フィードバックデータがありません', 'error'); return; }

  const minutes = Math.floor(state.elapsedSeconds / 60);
  const seconds = state.elapsedSeconds % 60;
  const now = new Date();
  const dateStr = now.toLocaleDateString('ja-JP');
  const timeStr = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });

  // CSVエスケープ: ダブルクォート囲み + 内部のダブルクォートを二重化
  function csvEscape(val) {
    const s = String(val ?? '').replace(/\n/g, ' ');
    return '"' + s.replace(/"/g, '""') + '"';
  }

  const rows = [];

  // ヘッダーセクション
  rows.push(['セクション', '項目', '内容'].map(csvEscape).join(','));
  rows.push(['', '', ''].map(csvEscape).join(','));

  // 基本情報
  rows.push(['基本情報', '実施日', dateStr + ' ' + timeStr].map(csvEscape).join(','));
  rows.push(['基本情報', '使用モデル', state.model].map(csvEscape).join(','));
  rows.push(['基本情報', '所要時間', `${minutes}分${seconds}秒`].map(csvEscape).join(','));
  rows.push(['基本情報', 'ターン数', state.turnCount].map(csvEscape).join(','));
  rows.push(['基本情報', 'シナリオ', state.scenario].map(csvEscape).join(','));
  rows.push(['基本情報', '顧客ペルソナ', state.persona].map(csvEscape).join(','));
  if (state.productURL) rows.push(['基本情報', '商品/サービスURL', state.productURL].map(csvEscape).join(','));
  if (state.goal) rows.push(['基本情報', 'ゴール設定', state.goal].map(csvEscape).join(','));
  rows.push(['基本情報', '評価基準', state.criteria].map(csvEscape).join(','));
  rows.push(['', '', ''].map(csvEscape).join(','));

  // 総合評価
  rows.push(['総合評価', '総合スコア', fb.overallScore + ' / 100'].map(csvEscape).join(','));
  rows.push(['総合評価', '総評', fb.summary].map(csvEscape).join(','));
  rows.push(['', '', ''].map(csvEscape).join(','));

  // 項目別評価
  if (fb.scores && fb.scores.length > 0) {
    rows.push(['項目別評価', '評価基準', 'スコア', 'コメント'].map(csvEscape).join(','));
    fb.scores.forEach(s => {
      rows.push(['項目別評価', s.criterion, s.score + '/' + s.maxScore, s.comment].map(csvEscape).join(','));
    });
    rows.push(['', '', ''].map(csvEscape).join(','));
  }

  // 良かった点
  if (fb.strengths && fb.strengths.length > 0) {
    fb.strengths.forEach((s, i) => {
      rows.push(['良かった点', `${i + 1}`, s].map(csvEscape).join(','));
    });
    rows.push(['', '', ''].map(csvEscape).join(','));
  }

  // 改善ポイント
  if (fb.improvements && fb.improvements.length > 0) {
    fb.improvements.forEach((s, i) => {
      rows.push(['改善ポイント', `${i + 1}`, s].map(csvEscape).join(','));
    });
    rows.push(['', '', ''].map(csvEscape).join(','));
  }

  // 模範回答
  if (fb.modelAnswer) {
    rows.push(['模範的な対応例', '', fb.modelAnswer].map(csvEscape).join(','));
    rows.push(['', '', ''].map(csvEscape).join(','));
  }

  // 会話ログ
  rows.push(['会話ログ', '話者', '発言内容'].map(csvEscape).join(','));
  state.messages.forEach((m, i) => {
    const speaker = m.role === 'user' ? '営業（あなた）' : '顧客（AI）';
    rows.push(['会話ログ', speaker, m.content].map(csvEscape).join(','));
  });

  // BOM付きUTF-8でダウンロード（Excel対応）
  const bom = '\uFEFF';
  const csvContent = bom + rows.join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);

  const fileName = `ロープレフィードバック_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.csv`;

  const a = document.createElement('a');
  a.href = url; a.download = fileName; a.style.display = 'none';
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  showToast('CSVをダウンロードしました', 'success');
};

window.backToSetup = () => { state.currentScreen='setup'; state.messages=[]; state.feedback=null; state.isFeedbackLoading=false; state.isProcessing=false; state.isSpeaking=false; state.isListening=false; state.turnCount=0; render(); };
</script>
